; PlatformIO Project Configuration File
; Target: STM32F446RE Nucleo + MPU9250 IMU driver
; https://docs.platformio.org/page/projectconf.html

[env:nucleo_f446re]
platform  = ststm32
board     = nucleo_f446re
framework = stm32cube

build_flags =
    -DUSE_HAL_DRIVER          ; Required: enables stm32f4xx_hal.h and all HAL headers
    -DSTM32F446xx             ; Required: selects the exact chip inside the HAL headers
    -IInc                     ; Required: tells the compiler where mpu9250.h and main.h live
    -u_printf_float           ; Required: enables %f in printf (disabled by default to save flash)
    -Wall                     ; Recommended: turn on all warnings

upload_protocol = stlink      ; Use the ST-Link v2-1 built into the Nucleo board
monitor_speed   = 115200      ; Match UART2 baud rate so the serial monitor works